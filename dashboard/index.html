<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base href="/dashboard/" />
    <title>Renewal Risk Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar" id="sidebar">
        <button id="sidebarToggle" class="sidebar-toggle" type="button" data-i18n="navOverview" data-i18n-attr="title">
          <span></span>
          <span></span>
          <span></span>
        </button>
        <div class="brand">
          <div class="brand-mark" id="brandMark">R</div>
          <div>
            <div class="brand-name" data-i18n="brand"></div>
            <div class="brand-subtitle" data-i18n="brandSub"></div>
          </div>
        </div>

        <nav class="section-nav" aria-label="Dashboard sections">
          <a href="#overview" data-i18n="navOverview"></a>
          <a href="#risk" data-i18n="navRisk"></a>
          <a href="#actions" data-i18n="navActions"></a>
          <a href="#clients" data-i18n="navClients"></a>
          <a href="#employees" data-i18n="navEmployees"></a>
        </nav>

        <div class="panel">
          <label class="file-label" for="csvInput" data-i18n="loadCsv"></label>
          <input id="csvInput" class="file-input" type="file" accept=".csv,text/csv" />
          <p class="hint" data-i18n="csvHint"></p>
        </div>

        <div class="panel summary-panel">
          <div class="panel-title" data-i18n="modelQuality"></div>
          <div id="metrics" class="metric-list">
            <div class="metric-row"><span data-i18n="rocAuc"></span><strong id="rocAuc">-</strong></div>
            <div class="metric-row"><span data-i18n="avgPrecision"></span><strong id="avgPrecision">-</strong></div>
            <div class="metric-row"><span data-i18n="accuracy"></span><strong id="modelAccuracy">-</strong></div>
          </div>
        </div>

        <div class="panel concern-panel">
          <div class="panel-title" data-i18n="concernMeter"></div>
          <div class="concern-gauge-wrap">
            <div class="concern-gauge">
              <div id="concernFill" class="concern-fill"></div>
            </div>
            <div class="concern-labels">
              <span data-i18n="low"></span>
              <strong id="concernValue">0%</strong>
              <span data-i18n="high"></span>
            </div>
          </div>
        </div>
      </aside>

      <main class="content">
        <header class="topbar">
          <button id="sidebarToggleTop" class="menu-button" type="button" data-i18n="navOverview" data-i18n-attr="title">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <div class="topbar-copy">
            <span class="topbar-kicker" data-i18n="topbarKicker"></span>
            <strong data-i18n="topbarTitle"></strong>
          </div>
          <div class="topbar-status" data-i18n="liveView"></div>
          <button id="langToggle" class="section-action" type="button" style="background:none;border:1px solid var(--line);cursor:pointer"></button>
        </header>

        <section class="content-section" id="overview">
          <div class="section-header">
            <div>
              <p class="eyebrow" data-i18n="overview"></p>
              <h1 data-i18n="overviewTitle"></h1>
            </div>
          </div>
          <p class="lede" data-i18n="overviewDesc"></p>
          <div class="hero-card hero-inline">
            <div>
              <div class="hero-card-label" data-i18n="currentView"></div>
              <div id="recordCount" class="hero-card-value" data-i18n="waitingData"></div>
              <div class="hero-card-sub" id="lastRefresh" data-i18n="waitingData"></div>
            </div>
            <div class="hero-inline-metrics">
              <div class="inline-metric">
                <span data-i18n="avgRenewal"></span>
                <strong id="avgRenewal">0%</strong>
              </div>
              <div class="inline-metric">
                <span data-i18n="avgChurn"></span>
                <strong id="avgChurn">0%</strong>
              </div>
            </div>
          </div>
          <section class="snapshot-grid">
            <article class="snapshot-card snapshot-featured">
              <span data-i18n="renewalDue30"></span>
              <strong id="due30Count">0</strong>
              <small data-i18n="renewalDue30Desc"></small>
            </article>
            <article class="snapshot-card">
              <span data-i18n="renewalDue60"></span>
              <strong id="due60Count">0</strong>
              <small data-i18n="renewalDue60Desc"></small>
            </article>
            <article class="snapshot-card">
              <span data-i18n="renewalDue90"></span>
              <strong id="due90Count">0</strong>
              <small data-i18n="renewalDue90Desc"></small>
            </article>
            <article class="snapshot-card">
              <span data-i18n="portfolioView"></span>
              <strong data-i18n="signals"></strong>
              <small data-i18n="portfolioDesc"></small>
            </article>
          </section>

          <section class="kpis" id="kpis">
            <article class="kpi-card">
              <span data-i18n="criticalRisk"></span>
              <strong id="criticalCount">0</strong>
              <small data-i18n="immediateIntervention"></small>
            </article>
            <article class="kpi-card">
              <span data-i18n="watchlist"></span>
              <strong id="watchlistCount">0</strong>
              <small data-i18n="monitorClosely"></small>
            </article>
            <article class="kpi-card">
              <span data-i18n="expansionReady"></span>
              <strong id="expansionCount">0</strong>
              <small data-i18n="highConfidence"></small>
            </article>
            <article class="kpi-card">
              <span data-i18n="companyHealth"></span>
              <strong id="healthScore">--</strong>
              <small id="healthLabel" data-i18n="healthIndicator"></small>
            </article>
          </section>
        </section>

        <section class="content-section" id="risk">
          <div class="section-header">
            <div>
              <p class="eyebrow" data-i18n="risk"></p>
              <h2 data-i18n="riskTitle"></h2>
            </div>
          </div>
          <section class="insight-grid">
          <article class="panel insight-panel">
            <div class="panel-header">
              <h2 data-i18n="topRisks"></h2>
              <span data-i18n="topRisksDesc"></span>
            </div>
            <div id="topRiskList" class="rank-list"></div>
          </article>
          </section>

          <section class="grid">
          <article class="panel chart-panel">
            <div class="panel-header">
              <h2 data-i18n="riskDistribution"></h2>
              <span data-i18n="riskDistDesc"></span>
            </div>
            <canvas id="riskChart" width="680" height="220"></canvas>
          </article>

          <article class="panel chart-panel">
            <div class="panel-header">
              <h2 data-i18n="churnVsRenewal"></h2>
              <span data-i18n="churnVsRenewalDesc"></span>
            </div>
            <canvas id="scatterChart" width="680" height="220"></canvas>
          </article>
          </section>
        </section>

        <section class="content-section" id="actions">
          <div class="section-header">
            <div>
              <p class="eyebrow" data-i18n="actions"></p>
              <h2 data-i18n="actionsTitle"></h2>
            </div>
          </div>
          <div class="panel table-panel">
            <div class="panel-header table-header">
              <div>
                <h2 data-i18n="actionQueue"></h2>
                <span data-i18n="actionQueueDesc"></span>
              </div>
            </div>
            <div id="actionQueue" class="action-queue"></div>
          </div>
        </section>

        <section class="content-section" id="clients">
          <div class="section-header">
            <div>
              <p class="eyebrow" data-i18n="clients"></p>
              <h2 data-i18n="clientsTitle"></h2>
            </div>
          </div>
          <section class="panel table-panel">
            <div class="panel-header table-header">
              <div>
                <h2 data-i18n="clientPriorities"></h2>
                <span data-i18n="clientPrioritiesDesc"></span>
              </div>
              <input id="searchInput" class="search-input" type="search" data-i18n-placeholder="searchClient" />
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th data-i18n="client"></th>
                    <th data-i18n="churnRisk"></th>
                    <th data-i18n="renewalPotential"></th>
                    <th data-i18n="segment"></th>
                    <th data-i18n="action"></th>
                  </tr>
                </thead>
                <tbody id="clientTable"></tbody>
              </table>
            </div>
          </section>
        </section>

        <section class="content-section" id="employees">
          <div class="section-header">
            <div>
              <p class="eyebrow" data-i18n="employees"></p>
              <h2 data-i18n="employeesTitle"></h2>
            </div>
          </div>
          <p class="lede" data-i18n="employeesDesc"></p>

          <section class="kpis employee-kpis" id="employeeKpis">
            <article class="kpi-card">
              <span data-i18n="totalEmployees"></span>
              <strong id="employeeCount">0</strong>
              <small data-i18n="rowsLoaded"></small>
            </article>
            <article class="kpi-card">
              <span data-i18n="negativeBalance"></span>
              <strong id="negativeBalanceCount">0</strong>
              <small data-i18n="deficit"></small>
            </article>
            <article class="kpi-card">
              <span data-i18n="lowBalance"></span>
              <strong id="lowBalanceCount">0</strong>
              <small data-i18n="belowThreshold"></small>
            </article>
            <article class="kpi-card">
              <span data-i18n="avgRemaining"></span>
              <strong id="avgRemainingBalance">0</strong>
              <small data-i18n="estimatedDays"></small>
            </article>
          </section>

          <section class="panel table-panel">
            <div class="panel-header table-header">
              <div>
                <h2 data-i18n="employeeLeaveRecords"></h2>
                <span data-i18n="sortedLowest"></span>
              </div>
              <input id="employeeSearchInput" class="search-input" type="search" data-i18n-placeholder="searchEmployee" />
            </div>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th data-i18n="employee"></th>
                    <th data-i18n="department"></th>
                    <th data-i18n="entitlement"></th>
                    <th data-i18n="opening"></th>
                    <th data-i18n="used"></th>
                    <th data-i18n="inLieu"></th>
                    <th data-i18n="joinDate"></th>
                    <th data-i18n="remaining"></th>
                  </tr>
                </thead>
                <tbody id="employeeTable"></tbody>
              </table>
            </div>
          </section>
        </section>
      </main>
    </div>

    <button id="chatToggle" class="chat-toggle" type="button" data-i18n="aiAssistant" data-i18n-attr="title">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </button>

    <aside id="chatPanel" class="chat-panel" data-i18n="aiAssistant" data-i18n-attr="aria-label">
      <div class="chat-header">
        <strong data-i18n="aiAssistant"></strong>
        <span id="chatModelBadge" class="chat-model-badge" data-i18n="noApiKey"></span>
        <button id="chatSave" class="chat-header-btn" type="button" data-i18n="saveChat" data-i18n-attr="title">💾</button>
        <button id="chatNew" class="chat-header-btn" type="button" data-i18n="newChat" data-i18n-attr="title">✕</button>
        <button id="chatTts" class="chat-tts" type="button" data-i18n="toggleSpeech" data-i18n-attr="title">🔊</button>
        <button id="chatClose" class="chat-close" type="button" data-i18n="close" data-i18n-attr="title">&times;</button>
      </div>
      <div class="chat-config">
        <input id="chatApiKey" class="chat-input chat-config-input" type="password" data-i18n-placeholder="apiKeyPlaceholder" />
        <div class="chat-config-row">
          <select id="chatProvider" class="chat-input chat-config-select">
            <option value="groq">Groq</option>
            <option value="openai">OpenAI</option>
            <option value="gemini">Gemini</option>
            <option value="custom">Custom</option>
          </select>
          <select id="chatModel" class="chat-input chat-config-half chat-select"></select>
          <input id="chatModelCustom" class="chat-input chat-config-half" type="text" data-i18n-placeholder="customModel" style="display:none" />
        </div>
        <input id="chatApiBase" class="chat-input chat-config-input" type="text" data-i18n-placeholder="apiBasePlaceholder" />
      </div>
      <div id="chatMessages" class="chat-messages">
        <div class="chat-message assistant">
          <div class="chat-bubble" data-i18n="chatWelcome"></div>
        </div>
      </div>
      <div class="chat-input-area">
        <input id="chatInput" class="chat-input" type="text" data-i18n-placeholder="chatInputPlaceholder" />
        <button id="chatMic" class="chat-mic" type="button" data-i18n="voiceInput" data-i18n-attr="title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <button id="chatSend" class="chat-send" type="button" data-i18n="send" data-i18n-attr="title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </aside>

    <script src="./app.js"></script>
  </body>
</html>
